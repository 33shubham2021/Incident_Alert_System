# ─────────────────────────────────────────────────────────────────────────────
# AlertMap – Host Nginx Configuration
#
# Place this file at:  /etc/nginx/sites-available/alertmap
# Enable with:         sudo ln -s /etc/nginx/sites-available/alertmap /etc/nginx/sites-enabled/alertmap
# Remove default:      sudo rm /etc/nginx/sites-enabled/default
# Test config:         sudo nginx -t
# Reload:              sudo systemctl reload nginx
#
# After Certbot runs, it will automatically modify this file to add HTTPS.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name test.rohitaman.com;

    # ── Frontend React App ─────────────────────────────────────────────────
    location /alert-system {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── API Server ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5051;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Auth Server ────────────────────────────────────────────────────────
    location /auth/ {
        proxy_pass         http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Default ────────────────────────────────────────────────────────────
    location / {
        return 301 /alert-system/;
    }
}
