# ─────────────────────────────────────────────────────────────────────────────
# AlertMap – Frontend Container Nginx Config
# Serves the Vite-built React SPA from /usr/share/nginx/html/alert-system/
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # React SPA under /alert-system/ — fallback to index.html for client-side routing
    location /alert-system/ {
        try_files $uri $uri/ /alert-system/index.html;
    }

    # Redirect bare /alert-system to /alert-system/
    location = /alert-system {
        return 301 /alert-system/;
    }

    # Simple health check endpoint
    location = /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Block everything else
    location / {
        return 404;
    }
}
